defaults:
  - override hydra/hydra_logging: disabled
  - override hydra/job_logging: disabled

seed: 0
float32_matmul_precision: high

diet_name: Comb
scheme_id: CombDiet
methods: simclr
backbone: resnet50
stage_epochs: [10, 6, 1, 5, 1, 2, 3, 2, 70]
reload_freq: 1
num_classes: 10
num_classes_linear: 10
batch_size_per_device: 64

# dataset
map_path: say_in1k_map.json
dataset_root: texture-vs-shape-master/stimuli/filled-silhouettes

ckpt_path: /path/to/SAY_pretrain.ckpt
lin_ckpt_path: /path/to/SAY_linear_probe.ckpt



run_name: ${diet_name}-${backbone}-scheme_${scheme_id}
hydra:
  run:
    dir: outputs/${methods}/${run_name}/seed_${seed}